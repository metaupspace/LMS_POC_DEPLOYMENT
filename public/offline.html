<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#FF7A1A" />
  <title>Offline - LMS Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #F5F6FA;
      color: #333;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      background-color: #FF7A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1A1A2E;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1rem;
      color: #6B7280;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      display: inline-block;
      padding: 0.75rem 2rem;
      background-color: #FF7A1A;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #e56a10;
    }
    button:active {
      background-color: #cc5e0e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">LMS</div>
    <h1>You're Offline</h1>
    <p>Please check your internet connection and try again. Your progress has been saved locally.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
